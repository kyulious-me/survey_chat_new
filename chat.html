<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼쩜삼 서류검토 Q&A</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', sans-serif;
            background: #f5f6fa;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #1a1a2e;
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        header .logo { font-size: 20px; font-weight: 700; color: #7b9fff; }
        header .subtitle { font-size: 12px; color: #aab4cc; margin-top: 2px; }
        header .badge {
            margin-left: auto;
            background: #2e3a5c;
            color: #7b9fff;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-width: 860px;
            width: 100%;
            margin: 0 auto;
        }
        .message { display: flex; gap: 10px; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
        .message.user { flex-direction: row-reverse; }
        .avatar {
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; flex-shrink: 0; margin-top: 2px;
        }
        .message.assistant .avatar { background: #1a1a2e; }
        .message.user .avatar { background: #3d5afe; }
        .bubble {
            max-width: 72%;
            padding: 11px 15px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.assistant .bubble {
            background: white;
            color: #222;
            border: 1px solid #e5e8f0;
            border-top-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .message.user .bubble {
            background: #3d5afe;
            color: white;
            border-top-right-radius: 4px;
        }
        .typing-indicator {
            display: flex; gap: 5px; padding: 13px 16px;
            background: white; border: 1px solid #e5e8f0;
            border-radius: 14px; border-top-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06); width: fit-content;
        }
        .typing-indicator span {
            width: 7px; height: 7px; border-radius: 50%;
            background: #aab4cc; animation: bounce 1.2s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
        #input-area {
            background: white;
            border-top: 1px solid #e5e8f0;
            padding: 12px 16px;
        }
        #input-inner {
            max-width: 860px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        #user-input {
            flex: 1;
            border: 1.5px solid #dde2f0;
            border-radius: 10px;
            padding: 10px 13px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            line-height: 1.5;
            max-height: 140px;
            overflow-y: auto;
            transition: border-color 0.15s;
        }
        #user-input:focus { border-color: #3d5afe; }
        #send-btn {
            width: 40px; height: 40px;
            border-radius: 10px; border: none;
            background: #3d5afe; color: white;
            font-size: 17px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        #send-btn:hover { background: #2a46e0; }
        #send-btn:disabled { background: #c0c8e8; cursor: not-allowed; }
        .quick-questions { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
        .quick-q {
            background: #eef1ff; color: #3d5afe;
            border: 1px solid #c5cef8; border-radius: 20px;
            padding: 6px 13px; font-size: 12.5px; cursor: pointer;
            transition: background 0.15s; font-family: inherit;
        }
        .quick-q:hover { background: #dce3ff; }
        /* API Key Modal */
        #modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 100;
            align-items: center; justify-content: center;
        }
        #modal-overlay.show { display: flex; }
        #modal {
            background: white; border-radius: 16px;
            padding: 28px; width: 90%; max-width: 440px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        #modal h2 { font-size: 17px; margin-bottom: 8px; color: #1a1a2e; }
        #modal p { font-size: 13px; color: #666; margin-bottom: 16px; line-height: 1.6; }
        #api-key-input {
            width: 100%; border: 1.5px solid #dde2f0;
            border-radius: 8px; padding: 10px 12px;
            font-size: 13px; font-family: monospace;
            outline: none; margin-bottom: 12px;
        }
        #api-key-input:focus { border-color: #3d5afe; }
        #save-key-btn {
            width: 100%; background: #3d5afe; color: white;
            border: none; border-radius: 8px; padding: 11px;
            font-size: 14px; cursor: pointer; font-family: inherit;
        }
        #save-key-btn:hover { background: #2a46e0; }
        .error-msg { color: #e74c3c; font-size: 12.5px; margin-top: 6px; }
    </style>
</head>
<body>

<!-- API Key Modal -->
<div id="modal-overlay">
    <div id="modal">
        <h2>🔑 Anthropic API 키 설정</h2>
        <p>챗봇을 사용하려면 Anthropic API 키가 필요해요.<br>
        키는 브라우저에만 저장되며 외부로 전송되지 않아요.<br>
        <a href="https://console.anthropic.com" target="_blank" style="color:#3d5afe">console.anthropic.com</a>에서 발급할 수 있어요.</p>
        <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." />
        <div id="key-error" class="error-msg" style="display:none"></div>
        <button id="save-key-btn" onclick="saveApiKey()">저장하고 시작하기</button>
    </div>
</div>

<header>
    <div>
        <div class="logo">삼쩜삼 서류검토 도우미</div>
        <div class="subtitle">월세 · 기부금 · 중소기업취업감면 Q&A</div>
    </div>
    <div class="badge" onclick="showApiKeyModal()" title="API 키 변경">⚙️ 내부 전용</div>
</header>

<div id="chat-area">
    <div class="message assistant">
        <div class="avatar">🤖</div>
        <div>
            <div class="bubble">안녕하세요! 추가공제 서류검토 가이드를 학습한 AI 어시스턴트입니다.

월세, 기부금, 중소기업취업감면(중취감) 서류 심사 관련 질문에 답변해 드릴게요.</div>
            <div class="quick-questions">
                <button class="quick-q" onclick="sendQuick(this.textContent)">납입증명서 예금주와 임차인이 다르면?</button>
                <button class="quick-q" onclick="sendQuick(this.textContent)">초본에 '본인 거주자' 표기 시 세대주 인정?</button>
                <button class="quick-q" onclick="sendQuick(this.textContent)">기부금 영수증 유효한 형식은?</button>
                <button class="quick-q" onclick="sendQuick(this.textContent)">중취감 청년 나이 기준은?</button>
                <button class="quick-q" onclick="sendQuick(this.textContent)">반려 후 상태값 변경 가능한가요?</button>
                <button class="quick-q" onclick="sendQuick(this.textContent)">자리페이로 납부한 월세는?</button>
            </div>
        </div>
    </div>
</div>

<div id="input-area">
    <div id="input-inner">
        <textarea id="user-input" rows="1" placeholder="질문을 입력하세요... (Enter 전송, Shift+Enter 줄바꿈)"></textarea>
        <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

const sendBtn = document.getElementById('send-btn');
let conversationHistory = [];
let isLoading = false;

// Auto-resize textarea
userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
});
userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function getApiKey() { return localStorage.getItem('anthropic_api_key'); }

function showApiKeyModal() {
    const overlay = document.getElementById('modal-overlay');
    overlay.classList.add('show');
    const existing = getApiKey();
    if (existing) document.getElementById('api-key-input').value = existing;
}

function saveApiKey() {
    const key = document.getElementById('api-key-input').value.trim();
    const errEl = document.getElementById('key-error');
    if (!key.startsWith('sk-ant-')) {
        errEl.textContent = 'API 키는 sk-ant- 로 시작해야 해요.';
        errEl.style.display = 'block';
        return;
    }
    errEl.style.display = 'none';
    localStorage.setItem('anthropic_api_key', key);
    document.getElementById('modal-overlay').classList.remove('show');
}

function appendMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(avatar);
    div.appendChild(bubble);
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing-msg';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';
    const ind = document.createElement('div');
    ind.className = 'typing-indicator';
    ind.innerHTML = '<span></span><span></span><span></span>';
    div.appendChild(avatar);
    div.appendChild(ind);
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
    const el = document.getElementById('typing-msg');
    if (el) el.remove();
}

async function sendMessage(text) {
    const apiKey = getApiKey();
    if (!apiKey) { showApiKeyModal(); return; }

    const msg = (text || userInput.value).trim();
    if (!msg || isLoading) return;

    userInput.value = '';
    userInput.style.height = 'auto';
    isLoading = true;
    sendBtn.disabled = true;

    appendMessage('user', msg);
    showTyping();

    const messages = [
        ...conversationHistory.slice(-10),
        { role: 'user', content: msg }
    ];

    try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': apiKey,
                'anthropic-version': '2023-06-01',
                'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                max_tokens: 2048,
                system: SYSTEM_PROMPT,
                messages: messages
            })
        });

        removeTyping();

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            if (res.status === 401) {
                appendMessage('assistant', 'API 키가 올바르지 않아요. 우측 상단 ⚙️를 눌러 키를 다시 입력해주세요.');
            } else {
                appendMessage('assistant', `오류: ${err.error?.message || res.statusText}`);
            }
        } else {
            const data = await res.json();
            const reply = data.content[0].text;
            appendMessage('assistant', reply);
            conversationHistory.push({ role: 'user', content: msg });
            conversationHistory.push({ role: 'assistant', content: reply });
        }
    } catch (e) {
        removeTyping();
        appendMessage('assistant', `네트워크 오류: ${e.message}`);
    }

    isLoading = false;
    sendBtn.disabled = false;
    userInput.focus();
}

function sendQuick(text) { sendMessage(text); }

// Check API key on load
window.addEventListener('load', () => {
    if (!getApiKey()) showApiKeyModal();
});
</script>
</body>
